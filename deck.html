<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursed Realm — Deck</title>
<meta name="description" content="View a Sorcery: Contested Realm deck on Cursed Realm.">
<meta property="og:type" content="website">
<meta property="og:title" content="Deck — Cursed Realm">
<meta property="og:description" content="View a Sorcery: Contested Realm deck on Cursed Realm.">
<meta property="og:image" content="https://cursedrealm.org/social-banner.png?v=2">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0b0a0f">
<link rel="icon" type="image/png" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0b0a0f; --abyss: #111018; --dusk: #1a1826; --twilight: #252338;
    --mist: #3a3658; --rune: #6b5fa0; --arcane: #9b87d4; --shimmer: #c9bfee;
    --parchment: #e8e0cc; --gold: #c8a96e; --ember: #c4614a; --sage: #5a8a6a;
    --border: rgba(155, 135, 212, 0.18); --border-strong: rgba(155, 135, 212, 0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--void); color: var(--parchment); font-family: 'Crimson Pro', serif; min-height: 100vh; }
  a { color: inherit; }

  header {
    background: linear-gradient(180deg, #0d0b14 0%, var(--void) 100%);
    border-bottom: 1px solid var(--border); padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    height: 60px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px);
  }
  .header-main { display: flex; align-items: center; gap: 16px; min-width: 0; flex-wrap: wrap; }
  #auth-bar { flex-shrink: 0; }
  .header-nav { display: flex; gap: 12px; align-items: center; }
  .header-link { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--rune); text-decoration: none; transition: color 0.2s; white-space: nowrap; }
  .header-link:hover { color: var(--arcane); }
  .logo-link { display: flex; align-items: center; gap: 9px; text-decoration: none; }
  .logo-link img { width: 30px; height: 30px; border-radius: 6px; }
  .logo-text { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); white-space: nowrap; }

  .hamburger { display: none; background: none; border: 1px solid var(--border-strong); color: var(--gold); font-size: 1.3rem; line-height: 1; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
  .mobile-nav { display: none; position: sticky; top: 60px; z-index: 99; background: #0d0b14; border-bottom: 1px solid var(--border); flex-direction: column; padding: 8px 0; }
  .mobile-nav.open { display: flex; }
  .mobile-nav .header-link { padding: 13px 24px; font-size: 0.85rem; border-bottom: 1px solid rgba(155,135,212,0.06); }
  @media (max-width: 980px) {
    .nav-collapsible { display: none !important; }
    .hamburger { display: block; }
    header { padding: 0 16px; }
  }

  .btn { padding: 8px 18px; font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
  .btn-primary { background: var(--rune); border-color: var(--arcane); color: #fff; }
  .btn-primary:hover { background: var(--arcane); }
  .btn-ghost { background: transparent; border-color: var(--border-strong); color: var(--shimmer); }
  .btn-ghost:hover { border-color: var(--arcane); color: #fff; }

  .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

  /* ── DECK HERO ── */
  .deck-hero { display: grid; grid-template-columns: 220px 1fr; gap: 26px; margin-bottom: 30px; align-items: start; }
  .deck-hero-avatar { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-strong); background: #0b0a0f; aspect-ratio: 5/7; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .deck-hero-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .deck-hero-avatar.placeholder { display: flex; align-items: center; justify-content: center; color: var(--mist); font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.1em; }
  .deck-hero-info { min-width: 0; }
  .deck-hero-name { font-family: 'Cinzel Decorative', serif; font-size: 2.1rem; font-weight: 700; color: var(--parchment); line-height: 1.15; margin-bottom: 8px; }
  .deck-hero-meta { font-family: 'Crimson Pro', serif; font-size: 1rem; color: var(--rune); margin-bottom: 4px; }
  .deck-hero-meta b { color: var(--gold); }
  .deck-hero-avatar-name { font-family: 'Crimson Pro', serif; font-size: 1.05rem; color: var(--gold); margin-bottom: 16px; }
  .hero-avatar-link { color: var(--gold); text-decoration: none; border-bottom: 1px dotted rgba(200,169,110,0.5); transition: color 0.15s, border-color 0.15s; }
  .hero-avatar-link:hover { color: var(--shimmer); border-bottom-color: var(--shimmer); }
  .hero-author-link { text-decoration: none; color: var(--arcane); transition: color 0.15s; }
  .hero-author-link:hover { color: var(--shimmer); text-decoration: underline; }
  /* Like button */
  .like-btn { display: inline-flex; align-items: center; gap: 7px; background: var(--dusk); border: 1px solid var(--border-strong); color: var(--shimmer); font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.04em; padding: 9px 16px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .like-btn:hover { border-color: var(--ember); color: var(--ember); }
  .like-btn .heart { font-size: 1.05rem; line-height: 1; }
  .like-btn.liked { background: rgba(196,97,74,0.16); border-color: var(--ember); color: var(--ember); }
  .like-btn:disabled { opacity: 0.6; cursor: default; }
  .like-count-badge { color: var(--gold); font-weight: 700; }
  /* Views counter (read-only, mirrors the like button) */
  .views-badge { display: inline-flex; align-items: center; gap: 7px; background: var(--dusk); border: 1px solid var(--border-strong); color: var(--shimmer); font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.04em; padding: 9px 16px; border-radius: 8px; cursor: default; }
  .views-badge .views-eye { font-size: 1rem; line-height: 1; opacity: 0.85; }
  .views-count-badge { color: var(--gold); font-weight: 700; }

  /* counts strip */
  .deck-counts { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0 18px; }
  .deck-count-pill { background: var(--dusk); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-family: 'Cinzel', serif; font-size: 0.78rem; color: var(--shimmer); }
  .deck-count-pill b { color: var(--gold); font-size: 1rem; }
  .deck-count-pill.ok { border-color: var(--sage); }
  .deck-count-pill.warn { border-color: var(--ember); }

  .deck-hero-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  /* element balance bar */
  .el-section { margin-top: 18px; max-width: 520px; }
  .el-section-title { font-family: 'Cinzel', serif; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rune); margin-bottom: 7px; }
  .el-bar { display: flex; width: 100%; height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,0,0,0.35); }
  .el-seg { height: 100%; }
  .el-labels { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-top: 9px; }
  .el-label { display: inline-flex; align-items: center; gap: 6px; font-family: 'Crimson Pro', serif; font-size: 0.9rem; color: var(--shimmer); }
  .el-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  /* ── VIEW TOGGLE ── */
  .deck-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .viewmode-wrap { display: flex; align-items: center; gap: 8px; }
  .viewmode-label { font-family: 'Cinzel', serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rune); }
  .viewmode-toggle { display: flex; border: 1px solid var(--border-strong); border-radius: 4px; overflow: hidden; }
  .viewmode-btn { padding: 6px 12px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--rune); cursor: pointer; font-size: 1rem; transition: all 0.15s; }
  .viewmode-btn:last-child { border-right: none; }
  .viewmode-btn:hover { color: var(--arcane); }
  .viewmode-btn.active { background: var(--rune); color: #fff; }
  .toolbar-left { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
  /* Threshold toggle switch */
  .threshold-toggle { background: none; border: none; cursor: pointer; padding: 0; display: inline-flex; align-items: center; }
  .th-toggle-track { width: 42px; height: 22px; border-radius: 11px; background: var(--twilight); border: 1px solid var(--border-strong); position: relative; transition: background 0.2s, border-color 0.2s; display: inline-block; }
  .th-toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--rune); transition: transform 0.2s, background 0.2s; }
  body.show-thresholds .th-toggle-track { background: rgba(200,169,110,0.25); border-color: var(--gold); }
  body.show-thresholds .th-toggle-knob { transform: translateX(20px); background: var(--gold); }

  /* ── SCROLL (deck description) ── */
  .scroll-tab-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--rune);
    background: transparent; border: 1px solid var(--border-strong); border-radius: 4px;
    padding: 6px 13px; cursor: pointer; transition: all 0.15s;
  }
  .scroll-tab-btn:hover { color: var(--arcane); border-color: var(--arcane); }
  .scroll-tab-btn.active { background: var(--gold); border-color: var(--gold); color: #1a1410; }
  .deck-scroll-box { background: var(--abyss); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 10px; padding: 20px 24px; }
  .deck-scroll-title { font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .deck-scroll-text { font-family: 'Crimson Pro', serif; font-size: 1.06rem; line-height: 1.75; color: var(--parchment); white-space: pre-wrap; word-wrap: break-word; }
  #deck-scroll-panel { margin-top: 8px; }

  /* ── COMMENTS ── */
  #deck-comments { margin-top: 28px; }
  .comments-head { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .comments-head .cc-count { color: var(--rune); font-family: 'Crimson Pro', serif; font-weight: 400; font-size: 0.95rem; text-transform: none; letter-spacing: 0; }
  .comment-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .comment-input { width: 100%; resize: vertical; min-height: 70px; background: #0b0a0f; border: 1px solid var(--border-strong); border-radius: 8px; color: var(--parchment); font-family: 'Crimson Pro', serif; font-size: 1.02rem; line-height: 1.5; padding: 11px 13px; outline: none; }
  .comment-input:focus { border-color: var(--rune); }
  .comment-input::placeholder { color: #3a3658; font-style: italic; }
  .comment-form-actions { display: flex; align-items: center; gap: 12px; }
  .comment-signin { background: var(--abyss); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; color: var(--rune); font-style: italic; margin-bottom: 22px; }
  .comment-signin a { color: var(--gold); cursor: pointer; text-decoration: underline; font-style: normal; }
  .comment-list { display: flex; flex-direction: column; gap: 16px; }
  .comment { background: var(--abyss); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; }
  .comment.is-reply { margin-left: 28px; background: rgba(17,16,24,0.6); border-left: 2px solid var(--mist); }
  .comment-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; flex-wrap: wrap; }
  .comment-author { font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700; color: var(--arcane); text-decoration: none; }
  .comment-author:hover { color: var(--shimmer); }
  .comment-author-badge { font-family: 'Cinzel', serif; font-size: 0.56rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #1a1410; background: var(--gold); padding: 2px 7px; border-radius: 9px; }
  .comment-time { font-size: 0.78rem; color: var(--rune); font-style: italic; }
  .comment-body { font-family: 'Crimson Pro', serif; font-size: 1.02rem; line-height: 1.6; color: var(--parchment); white-space: pre-wrap; word-wrap: break-word; }
  .comment-actions { display: flex; gap: 14px; margin-top: 8px; }
  .comment-action { background: none; border: none; padding: 0; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.66rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--rune); transition: color 0.15s; }
  .comment-action:hover { color: var(--arcane); }
  .comment-action.danger:hover { color: var(--ember); }
  .comment-empty { color: var(--rune); font-style: italic; padding: 6px 0 4px; }
  .comment-reply-box { margin: 10px 0 2px; }

  /* ── DECK SECTIONS ── */
  .deck-section { margin-bottom: 26px; }
  .deck-section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
  .deck-section-title { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); }

  /* DECK STATS PANEL */
  .deck-stats-panel { background: var(--abyss); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; display: grid; grid-template-columns: 1.3fr 1fr 0.9fr; gap: 20px 28px; }
  .stat-block-title { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--rune); margin-bottom: 10px; }
  .stat-quick { display: flex; gap: 18px; flex-wrap: wrap; grid-column: 1 / -1; padding-bottom: 14px; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .stat-quick-item { display: flex; flex-direction: column; }
  .stat-quick-item b { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--gold); line-height: 1; }
  .stat-quick-item span { font-size: 0.7rem; color: var(--rune); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
  .stat-quick-divider { width: 1px; align-self: stretch; background: var(--border); margin: 0 2px; }
  /* spell-type sub-stats read a touch quieter than the headline numbers */
  .stat-quick-type b { font-size: 1.15rem; color: var(--shimmer); }
  .stat-quick-type span { color: var(--rune); }
  @media (max-width: 560px) { .stat-quick-divider { display: none; } }
  /* mana curve */
  .curve-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .curve-label { width: 42px; font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--rune); flex-shrink: 0; }
  .curve-track { flex: 1; height: 14px; background: var(--dusk); border-radius: 3px; overflow: hidden; }
  .curve-fill { height: 100%; background: linear-gradient(90deg, var(--rune), var(--arcane)); border-radius: 3px; min-width: 2px; transition: width 0.3s; }
  .curve-val { width: 22px; text-align: right; font-size: 0.78rem; color: var(--shimmer); flex-shrink: 0; }
  .curve-thr { display: inline-flex; align-items: center; gap: 1px; flex-shrink: 0; min-width: 0; }
  .tstat-icon { width: 15px; height: 15px; object-fit: contain; }
  /* peak threshold — big repeated symbols */
  .thr-symbols-big { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .tstat-icon-big { width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7)); }
  .peak-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .peak-syms { display: inline-flex; gap: 2px; align-items: center; }
  .peak-cost { font-family: 'Crimson Pro', serif; font-size: 0.9rem; color: var(--rune); }
  .peak-cost b { color: var(--gold); font-family: 'Cinzel', serif; font-size: 1rem; }
  .peak-cost-site { font-style: italic; }
  /* threshold summary */
  .thr-summary { display: flex; flex-direction: column; gap: 7px; }
  .thr-summary-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--shimmer); }
  .thr-summary-item img { width: 22px; height: 22px; object-fit: contain; }
  .thr-summary-item b { color: var(--gold); font-family: 'Cinzel', serif; }
  @media (max-width: 900px) { .deck-stats-panel { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .deck-stats-panel { grid-template-columns: 1fr; } }
  /* element pie */
  .pie-wrap { display: flex; align-items: center; gap: 14px; }
  .pie-svg { width: 110px; height: 110px; flex-shrink: 0; }
  .pie-center-pct { fill: var(--gold); font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; }
  .pie-center-el { fill: var(--rune); font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .pie-legend { display: flex; flex-direction: column; gap: 6px; }
  .pie-leg-item { display: flex; align-items: center; gap: 7px; font-size: 0.85rem; color: var(--shimmer); }
  .pie-leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .pie-leg-item b { color: var(--gold); font-family: 'Cinzel', serif; margin-left: auto; }

  /* collapsible section heads */
  .deck-section-head { cursor: pointer; user-select: none; }
  .deck-section-head:hover .deck-section-title { color: var(--shimmer); }
  .deck-section-caret { display: inline-block; color: var(--rune); font-size: 0.8rem; margin-right: 8px; transition: transform 0.18s; }
  .deck-section.collapsed .deck-section-caret { transform: rotate(-90deg); }
  .deck-section.collapsed .deck-section-body { display: none; }
  .deck-section-count { font-family: 'Crimson Pro', serif; font-size: 0.9rem; color: var(--rune); }
  .count-breakdown { color: var(--arcane); }
  .deck-subgroup-title { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--arcane); margin: 14px 0 8px; }

  /* TEXT view */
  .deck-list { columns: 2; column-gap: 28px; }
  @media (max-width: 680px) { .deck-list { columns: 1; } }
  .deck-list-row { display: flex; align-items: center; gap: 8px; padding: 2px 8px; border-radius: 3px; transition: background 0.12s; cursor: pointer; line-height: 1.3; break-inside: avoid; }
  .deck-list-row:hover { background: rgba(155,135,212,0.08); }
  .deck-list-qty { font-family: 'Cinzel', serif; font-weight: 700; color: var(--gold); min-width: 24px; font-size: 0.9rem; }
  .deck-list-name { flex: 1; color: var(--shimmer); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deck-list-cost { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--rune); width: 21px; height: 21px; border:1px solid var(--border-strong); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .deck-list-cost.empty { opacity: 0; }

  /* DETAILS view — boxy rows like the explorer */
  .deck-details { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 6px; }
  .deck-detail-row { display: grid; grid-template-columns: auto auto 1fr auto auto auto auto; align-items: center; gap: 8px; background: #13111e; border: 1px solid var(--border); border-left: 3px solid var(--border-strong); padding: 6px 10px; border-radius: 3px; cursor: pointer; transition: background 0.12s; min-width: 0; }
  .deck-detail-row:hover { background: #1a1728; border-left-color: var(--arcane); }
  .cr-mana { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 700; color: var(--gold); background: radial-gradient(circle at 38% 32%, #2a2536, #15121d); border: 1px solid var(--gold); flex-shrink: 0; line-height: 1; }
  .cr-mana.empty { visibility: hidden; }
  .dd-qty { font-family: 'Cinzel', serif; font-weight: 700; font-size: 0.9rem; color: var(--gold); min-width: 22px; }
  .dd-name { font-family: 'Crimson Pro', serif; font-size: 0.95rem; color: var(--parchment); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .dd-th { display: inline-flex; gap: 3px; }
  .set-badge { display: inline-flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-weight: 700; font-size: 0.58rem; min-width: 20px; height: 18px; padding: 0 5px; border-radius: 9px; border: 1px solid; white-space: nowrap; line-height: 1; }
  .set-alpha  { color: #d8b878; background: rgba(200,169,110,0.15); border-color: rgba(200,169,110,0.55); }
  .set-beta   { color: #c2c2cc; background: rgba(180,180,195,0.13); border-color: rgba(180,180,195,0.5); }
  .set-arth   { color: #7fb88a; background: rgba(90,160,110,0.15); border-color: rgba(90,160,110,0.55); }
  .set-gothic { color: #b49ce0; background: rgba(155,135,212,0.16); border-color: rgba(155,135,212,0.55); }
  .set-dragon { color: #e0907c; background: rgba(196,97,74,0.16); border-color: rgba(196,97,74,0.55); }
  .set-promo  { color: #88b4d8; background: rgba(120,160,200,0.15); border-color: rgba(120,160,200,0.55); }
  .set-other  { color: var(--rune); background: rgba(120,110,150,0.12); border-color: rgba(120,110,150,0.4); }
  .dd-rarity { font-family: 'Cinzel', serif; font-size: 0.52rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }
  .dd-rarity.ordinary { background: rgba(140,140,150,0.12); color: #9a9aa5; }
  .dd-rarity.exceptional { background: rgba(90,138,176,0.14); color: #5a96b0; }
  .dd-rarity.elite { background: rgba(155,135,212,0.14); color: var(--arcane); }
  .dd-rarity.unique { background: rgba(200,169,110,0.14); color: var(--gold); }
  .dd-type { font-size: 0.68rem; color: var(--rune); white-space: nowrap; }
  @media (max-width: 560px) { .deck-details { grid-template-columns: 1fr; } .dd-type { display: none; } }

  /* CARD / LARGE grid view */
  .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .deck-grid.large { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
  .deck-card-cell { position: relative; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); background: var(--dusk); cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .deck-card-cell:hover { transform: translateY(-3px); border-color: var(--arcane); z-index: 2; }
  .cell-img-wrap { position: relative; width: 100%; aspect-ratio: 5/7; overflow: hidden; }
  .deck-card-cell > .cell-img-wrap > img.card-art { width: 100%; height: 100%; display: block; object-fit: cover; background: #0b0a0f; }
  /* Site cards rendered landscape with the image rotated 90° (full card visible) */
  /* Sites span 2 grid columns so they render much larger than portrait cards.
     In card view a site ≈ the old large size; in large view it ≈ double that. */
  .deck-card-cell.is-site { grid-column: span 2; }
  .deck-card-cell.is-site .cell-img-wrap { aspect-ratio: 7/5; display: flex; align-items: center; justify-content: center; background: #0b0a0f; overflow: hidden; }
  .deck-card-cell.is-site > .cell-img-wrap > img.card-art { position: absolute; width: 80%; height: auto; aspect-ratio: 5/7; transform: rotate(90deg); object-fit: contain; }
  .deck-card-cell .qty-chip { position: absolute; top: 7px; right: 7px; background: rgba(11,10,15,0.9); border: 1.5px solid var(--gold); color: var(--gold); font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.4rem; line-height: 1; padding: 5px 11px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); z-index: 3; }
  .deck-card-cell .qty-chip .qty-x { font-size: 0.85rem; opacity: 0.8; margin-left: 1px; }
  .deck-grid.large .deck-card-cell .qty-chip { font-size: 1.7rem; padding: 6px 13px; }
  .deck-card-cell .cell-name { padding: 6px 8px; font-size: 0.78rem; color: var(--shimmer); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Threshold overlay — hidden by default, shown when body.show-thresholds */
  .th-overlay { position: absolute; left: 6px; bottom: 6px; display: none; align-items: center; gap: 6px; z-index: 3; flex-wrap: wrap; max-width: calc(100% - 12px); background: rgba(11,10,15,0.78); border: 1px solid var(--border-strong); border-radius: 9px; padding: 5px 9px; backdrop-filter: blur(2px); }
  body.show-thresholds .th-overlay { display: inline-flex; }
  .th-group { display: inline-flex; gap: 2px; align-items: center; }
  /* Overlay icons are large & always upright (never inherit card rotation) */
  .th-icon { width: 40px; height: 40px; object-fit: contain; display: inline-block; transform: none !important; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8)); }
  .deck-grid.large .th-icon { width: 52px; height: 52px; }
  /* threshold symbols in the text/details rows */
  .deck-list-th, .dd-th { display: inline-flex; gap: 4px; align-items: center; }
  .th-row-icon { width: 15px; height: 15px; object-fit: contain; display: inline-block; vertical-align: middle; }

  .status { text-align: center; padding: 60px 20px; color: var(--rune); font-style: italic; }

  /* lightbox for card zoom */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(11,10,15,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 30px; cursor: zoom-out; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90%; max-height: 90vh; border-radius: 12px; box-shadow: 0 12px 50px rgba(0,0,0,0.7); }

  /* hover preview (desktop only) */
  .hover-preview { position: fixed; z-index: 1500; pointer-events: none; opacity: 0; transition: opacity 0.12s; display: none; }
  .hover-preview.show { opacity: 1; }
  .hover-preview img { width: 280px; max-width: 42vw; border-radius: 12px; border: 1px solid var(--border-strong); box-shadow: 0 12px 40px rgba(0,0,0,0.75); display: block; background: #0b0a0f; }
  /* Site cards preview rotated landscape — box is sized landscape, image rotated to fill */
  .hover-preview.is-site { width: 392px; max-width: 59vw; height: 280px; max-height: 42vw; display: flex; align-items: center; justify-content: center; }
  .hover-preview.is-site img { width: 280px; max-width: 42vw; transform: rotate(90deg); transform-origin: center center; }
  @media (hover: hover) and (pointer: fine) { .hover-preview { display: block; } }

  /* CARD DETAIL MODAL */
  .card-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(11,10,15,0.85); z-index: 1200; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; }
  .card-modal-overlay.open { display: flex; }
  .card-modal { background: var(--dusk); border: 1px solid var(--border-strong); border-radius: 12px; display: grid; grid-template-columns: 460px 1fr; max-width: 860px; width: 100%; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.7); max-height: 90vh; }
  .card-modal.site-modal { grid-template-columns: 1fr; max-width: 760px; }
  .card-modal-img { background: var(--twilight); display: flex; align-items: center; justify-content: center; padding: 22px; }
  .card-modal-img img { width: 100%; max-width: 340px; aspect-ratio: 5/7; object-fit: contain; border-radius: 8px; display: block; }
  .card-modal.site-modal .card-modal-img img { max-width: 460px; aspect-ratio: auto; transform: rotate(90deg); transform-origin: center center; }
  .card-modal.site-modal .card-modal-img { min-height: 360px; }
  .card-modal-info { padding: 24px 26px; overflow-y: auto; }
  .card-modal-name { font-family: 'Cinzel Decorative', serif; font-size: 1.6rem; font-weight: 700; color: var(--parchment); line-height: 1.15; margin-bottom: 6px; }
  .card-modal-type { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .card-modal-stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .card-modal-stat { background: rgba(11,10,15,0.45); border: 1px solid var(--border); border-radius: 5px; padding: 5px 11px; font-size: 0.88rem; color: var(--shimmer); }
  .card-modal-stat b { color: var(--rune); font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 3px; }
  .card-modal-stat .th-row-icon { width: 14px; height: 14px; vertical-align: middle; }
  .card-modal-text { font-family: 'Crimson Pro', serif; font-size: 1.02rem; line-height: 1.6; color: var(--parchment); white-space: pre-wrap; }
  .card-modal-close { position: absolute; top: 12px; right: 12px; background: rgba(11,10,15,0.7); border: 1px solid var(--border-strong); color: var(--shimmer); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; z-index: 3; }
  .card-modal-close:hover { color: var(--ember); border-color: var(--ember); }
  @media (max-width: 720px) {
    .card-modal { grid-template-columns: 1fr; max-height: 92vh; overflow-y: auto; }
    .card-modal-img img { max-width: 240px; }
    .card-modal-name { font-size: 1.3rem; }
  }

  /* confirm modal */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(11,10,15,0.84); backdrop-filter: blur(4px); z-index: 1100; align-items: center; justify-content: center; padding: 20px; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--dusk); border: 1px solid var(--border-strong); border-radius: 10px; max-width: 420px; width: 100%; padding: 26px; text-align: center; box-shadow: 0 16px 50px rgba(0,0,0,0.6); }
  .confirm-icon { font-size: 2.2rem; color: var(--gold); margin-bottom: 8px; }
  .confirm-title { font-family: 'Cinzel', serif; font-size: 1.25rem; font-weight: 700; color: var(--parchment); margin-bottom: 10px; }
  .confirm-msg { color: var(--rune); line-height: 1.55; margin-bottom: 20px; }
  .confirm-msg b { color: var(--shimmer); }
  .confirm-actions { display: flex; gap: 12px; justify-content: center; }
  .confirm-actions .btn { min-width: 130px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--dusk); border: 1px solid var(--border-strong); color: var(--shimmer); font-size: 0.9rem; padding: 11px 20px; border-radius: 6px; z-index: 1200; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 720px) {
    .deck-hero { grid-template-columns: 130px 1fr; gap: 16px; }
    .deck-hero-name { font-size: 1.5rem; }
    .deck-grid { grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 9px; }
    .deck-grid.large { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); }
    /* keep sites spanning 2 on mobile too (they read better large), but never overflow */
    .deck-card-cell.is-site { grid-column: span 2; }
  }
  @media (max-width: 280px) {
    .deck-card-cell.is-site { grid-column: span 1; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://nuizkjkcephopnbcmtlz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_9er9B3YGFuvNO8Y8W6yr2g_sR5tXvKH';
  let supa = null;
  try { if (window.supabase) supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

  const IMAGE_BASE = 'https://pub-5999238092ad418ca60e7a9ad641cf57.r2.dev/';
  const ELEMENT_COLORS = { air: '#8cb4d2', earth: '#a08246', fire: '#c4614a', water: '#5a96b0' };
  const RARITY_ORDER = { 'Unique':0, 'Elite':1, 'Exceptional':2, 'Ordinary':3 };

  let cardMap = {};        // lowercased name → full card object
  let cardSlugMap = {};    // lowercased name → slug
  let cardElementMap = {}; // lowercased name → [elements]
  let currentDeck = null;  // the loaded deck row
  let currentUser = null;
  let deckView = localStorage.getItem('grimoire_deckview_mode') || 'grid';

  // ── Load card data ──
  async function loadCards() {
    try {
      const res = await fetch('cards.json');
      const cards = await res.json();
      cards.forEach(c => {
        const key = (c.name || '').toLowerCase();
        const g = c.guardian || {};
        // Prefer Beta printing over Alpha; fall back to Alpha, then first set listed.
        const sets = c.sets || [];
        const chosenSet = sets.find(s => /beta/i.test(s.name || ''))
          || sets.find(s => /alpha/i.test(s.name || ''))
          || sets[0];
        let slug = c.slug || null;
        if (!slug && chosenSet && chosenSet.variants && chosenSet.variants.length) {
          const v = chosenSet.variants.find(v => v.finish === 'Standard' && v.product === 'Booster') || chosenSet.variants[0];
          slug = v ? v.slug : null;
        }
        const els = Array.isArray(c.elements) ? c.elements : (c.elements ? String(c.elements).split(',') : []);
        cardElementMap[key] = els.map(e => String(e).trim().toLowerCase()).filter(Boolean);
        cardSlugMap[key] = slug;
        cardMap[key] = {
          name: c.name, type: g.type || '', rarity: g.rarity || '', cost: g.cost,
          attack: g.attack, defence: g.defence, life: g.life, rules_text: g.rulesText || '',
          element: els.join(', '), slug, thresholds: g.thresholds || {},
          set: chosenSet ? (chosenSet.name || '') : '',
          subTypes: c.subTypes || ''
        };
      });
    } catch (e) { console.warn('cards.json failed', e); }
  }

  function imgUrl(name) {
    const slug = cardSlugMap[(name||'').toLowerCase()];
    if (slug) return `${IMAGE_BASE}${slug}.png`;
    return `${IMAGE_BASE}${(name||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')}.png`;
  }

  // ── Deck data helpers ──
  function avatarName(dd) { return (dd.a && dd.a.length) ? dd.a[0][0] : null; }

  function deckElementBreakdown(dd) {
    const counts = { air:0, earth:0, fire:0, water:0 }; let total = 0;
    ['a','t','s'].forEach(sec => (dd[sec]||[]).forEach(([name, qty]) => {
      const q = qty || 1; const ce = cardElementMap[(name||'').toLowerCase()];
      if (ce && ce.length) ce.forEach(e => { if (counts[e] != null) { counts[e] += q; total += q; } });
    }));
    if (!total) return [];
    return Object.entries(counts).filter(([,v]) => v>0)
      .map(([el,v]) => ({ el, pct: v/total*100 })).sort((a,b)=>b.pct-a.pct);
  }

  function sectionCount(dd, sec) { return (dd[sec]||[]).reduce((s,[,q])=>s+(q||0),0); }

  // ── Render ──
  function setDeckView(mode) {
    deckView = mode;
    localStorage.setItem('grimoire_deckview_mode', mode);
    ['list','details','grid','large'].forEach(m => {
      const btn = document.getElementById('vm-' + m);
      if (btn) btn.classList.toggle('active', mode === m);
    });
    // Picking a card layout exits the Scroll view (on desktop)
    scrollMode = false;
    renderSections();
    applyScrollLayout();
  }

  // ── Scroll (deck description) ──
  let scrollMode = false;
  function deckScrollText() {
    const dd = (currentDeck && currentDeck.deck_data) || {};
    return (dd.d || '').trim();
  }
  function renderScrollPanel() {
    const panel = document.getElementById('deck-scroll-panel');
    const txt = deckScrollText();
    if (!txt) { panel.innerHTML = ''; return; }
    panel.innerHTML = '<div class="deck-scroll-box"><div class="deck-scroll-title">📜 Scroll</div><div class="deck-scroll-text"></div></div>';
    panel.querySelector('.deck-scroll-text').textContent = txt;
  }
  function applyScrollLayout() {
    const panel = document.getElementById('deck-scroll-panel');
    const stats = document.getElementById('deck-stats-panel');
    const sections = document.getElementById('deck-sections');
    const tab = document.getElementById('scroll-tab');
    const has = !!deckScrollText();
    tab.style.display = has ? '' : 'none';
    if (!has) { panel.style.display = 'none'; scrollMode = false; tab.classList.remove('active'); return; }
    const isMobile = window.matchMedia('(max-width: 720px)').matches;
    if (isMobile) {
      // Mobile: Scroll always sits inline below the deck; tab is a jump button
      panel.style.display = 'block';
      stats.style.display = '';
      sections.style.display = '';
      tab.classList.remove('active');
    } else if (scrollMode) {
      // Desktop: Scroll replaces the deck content
      panel.style.display = 'block';
      stats.style.display = 'none';
      sections.style.display = 'none';
      tab.classList.add('active');
    } else {
      panel.style.display = 'none';
      stats.style.display = '';
      sections.style.display = '';
      tab.classList.remove('active');
    }
  }
  function scrollBtnClick() {
    if (window.matchMedia('(max-width: 720px)').matches) {
      applyScrollLayout();
      document.getElementById('deck-scroll-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      scrollMode = !scrollMode;
      applyScrollLayout();
    }
  }
  window.addEventListener('resize', () => { if (currentDeck) applyScrollLayout(); });

  let showThresholds = localStorage.getItem('grimoire_deckview_thresholds') === '1';
  function toggleThresholds() {
    showThresholds = !showThresholds;
    localStorage.setItem('grimoire_deckview_thresholds', showThresholds ? '1' : '0');
    document.body.classList.toggle('show-thresholds', showThresholds);
  }

  function cardCost(name) { const c = cardMap[(name||'').toLowerCase()]; return c && c.cost != null ? c.cost : ''; }
  function cardRarityRank(name) { const c = cardMap[(name||'').toLowerCase()]; return c ? (RARITY_ORDER[c.rarity] ?? 9) : 9; }
  function cardType(name) { const c = cardMap[(name||'').toLowerCase()]; return c ? c.type : ''; }

  function sortEntries(entries) {
    // sort by cost then name
    return [...entries].sort((a,b) => {
      const ca = cardCost(a[0]), cb = cardCost(b[0]);
      const na = ca===''?99:ca, nb = cb===''?99:cb;
      return na - nb || a[0].localeCompare(b[0]);
    });
  }

  function cardThresholds(name) {
    const c = cardMap[(name||'').toLowerCase()];
    return c && c.thresholds ? c.thresholds : {};
  }
  function isSite(name) {
    return (cardType(name) || '').toLowerCase() === 'site';
  }
  function cardSet(name) { const c = cardMap[(name||'').toLowerCase()]; return c ? c.set : ''; }
  function cardRarity(name) { const c = cardMap[(name||'').toLowerCase()]; return c ? c.rarity : ''; }
  function rarityAbbr(r) { return { 'Unique':'Uni', 'Elite':'Eli', 'Exceptional':'Exc', 'Ordinary':'Ord' }[r] || r; }
  function setBadge(set) {
    const s = (set || '').toLowerCase();
    let cls = 'set-other', label = (set || '?').slice(0,3).toUpperCase();
    if (s.includes('alpha')) { cls='set-alpha'; label='ALP'; }
    else if (s.includes('beta')) { cls='set-beta'; label='BET'; }
    else if (s.includes('arthur')) { cls='set-arth'; label='ART'; }
    else if (s.includes('goth')) { cls='set-gothic'; label='GOT'; }
    else if (s.includes('dragon')) { cls='set-dragon'; label='DRG'; }
    else if (s.includes('promo')) { cls='set-promo'; label='PRO'; }
    if (!set) return '';
    return `<span class="set-badge ${cls}">${label}</span>`;
  }

  // Build the threshold overlay shown over a card — repeated element symbols
  // (e.g. 2 fire threshold = two fire symbols), matching the rest of the site.
  const THRESHOLD_ELS = ['air','earth','fire','water'];
  const THRESHOLD_IMG = { air:'wind.png', earth:'earth.png', fire:'fire.png', water:'water.png' };
  function thresholdSymbols(name, cls) {
    const th = cardThresholds(name);
    const groups = [];
    THRESHOLD_ELS.forEach(el => {
      const n = th[el] || 0;
      if (n > 0) {
        const file = THRESHOLD_IMG[el];
        const icons = Array.from({ length: n }, () => `<img src="${file}" alt="${el}" class="${cls}">`).join('');
        groups.push(`<span class="th-group">${icons}</span>`);
      }
    });
    return groups;
  }
  function thresholdOverlayHtml(name) {
    const groups = thresholdSymbols(name, 'th-icon');
    if (!groups.length) return '';
    return `<div class="th-overlay">${groups.join('')}</div>`;
  }

  function renderEntryRow([name, qty]) {
    const cost = cardCost(name);
    const thStr = thresholdSymbols(name, 'th-row-icon').join('');
    return `<div class="deck-list-row" data-card="${escAttr(name)}" onclick="zoom('${escAttr(name)}')">
      <span class="deck-list-cost${cost===''?' empty':''}">${cost}</span>
      <span class="deck-list-qty">${qty}×</span>
      <span class="deck-list-name">${escHtml(name)}</span>
      <span class="deck-list-th">${thStr}</span>
    </div>`;
  }

  // Boxy "Details" row — like the explorer's detail list
  function renderEntryDetail([name, qty]) {
    const cost = cardCost(name);
    const rarity = cardRarity(name);
    const type = cardType(name);
    const thStr = thresholdSymbols(name, 'th-row-icon').join('');
    return `<div class="deck-detail-row" data-card="${escAttr(name)}" onclick="zoom('${escAttr(name)}')">
      <span class="cr-mana${cost===''?' empty':''}">${cost}</span>
      <span class="dd-qty">${qty}×</span>
      <span class="dd-name">${escHtml(name)}</span>
      <span class="dd-th">${thStr}</span>
      <span class="dd-set">${setBadge(cardSet(name))}</span>
      <span class="dd-rarity ${(rarity||'').toLowerCase()}">${rarityAbbr(rarity)}</span>
      <span class="dd-type">${escHtml(type)}</span>
    </div>`;
  }

  function renderEntryCell([name, qty]) {
    const siteClass = isSite(name) ? ' is-site' : '';
    return `<div class="deck-card-cell${siteClass}" data-card="${escAttr(name)}" onclick="zoom('${escAttr(name)}')">
      <div class="cell-img-wrap">
        <img class="card-art" src="${imgUrl(name)}" alt="${escHtml(name)}" loading="lazy" onerror="this.style.opacity='0.2'">
        ${thresholdOverlayHtml(name)}
      </div>
      <div class="qty-chip">${qty}<span class="qty-x">×</span></div>
      <div class="cell-name">${escHtml(name)}</div>
    </div>`;
  }

  const collapsedSections = {};  // title → true when collapsed
  function toggleSection(title) {
    collapsedSections[title] = !collapsedSections[title];
    const el = document.getElementById('section-' + title.replace(/\s+/g,'-'));
    if (el) el.classList.toggle('collapsed', collapsedSections[title]);
  }

  function renderSectionBlock(title, entries, opts = {}) {
    if (!entries || !entries.length) {
      if (!opts.showEmpty) return '';
    }
    const count = entries.reduce((s,[,q])=>s+(q||0),0);
    let inner = '';
    if (deckView === 'list') {
      inner = `<div class="deck-list">${sortEntries(entries).map(renderEntryRow).join('')}</div>`;
    } else if (deckView === 'details') {
      inner = `<div class="deck-details">${sortEntries(entries).map(renderEntryDetail).join('')}</div>`;
    } else {
      const gridClass = deckView === 'large' ? 'deck-grid large' : 'deck-grid';
      inner = `<div class="${gridClass}">${sortEntries(entries).map(renderEntryCell).join('')}</div>`;
    }
    const sid = 'section-' + title.replace(/\s+/g,'-');
    const collapsed = collapsedSections[title] ? ' collapsed' : '';
    // Count suffix: either a per-type breakdown, a simple parenthetical, or the limit text.
    let suffix = '';
    if (opts.breakdown === 'type') {
      const byType = {};
      entries.forEach(([name, q]) => {
        const c = cardMap[(name||'').toLowerCase()];
        const t = (c && c.type) ? c.type : 'Other';
        byType[t] = (byType[t] || 0) + (q || 0);
      });
      const order = ['Minion','Magic','Artifact','Aura','Avatar','Site','Other'];
      const parts = Object.entries(byType)
        .sort((a,b) => (order.indexOf(a[0])+1||99) - (order.indexOf(b[0])+1||99))
        .map(([t,n]) => `${n} ${t.toLowerCase()}${n===1?'':'s'}`);
      if (parts.length) suffix = ` <span class="count-breakdown">(${parts.join(', ')})</span>`;
    } else if (opts.paren) {
      suffix = ` <span class="count-breakdown">(${opts.paren})</span>`;
    } else if (opts.limit) {
      suffix = ` · ${opts.limit}`;
    }
    return `<div class="deck-section${collapsed}" id="${sid}">
      <div class="deck-section-head" onclick="toggleSection('${title}')">
        <span class="deck-section-title"><span class="deck-section-caret">▾</span>${title}</span>
        <span class="deck-section-count">${count} card${count===1?'':'s'}${suffix}</span>
      </div>
      <div class="deck-section-body">
        ${entries.length ? inner : '<div style="color:var(--rune);font-style:italic;padding:8px 0;">None</div>'}
      </div>
    </div>`;
  }

  function renderDeckStats(dd) {
    const panel = document.getElementById('deck-stats-panel');
    if (!panel) return;
    const spells = dd.s || [];
    const atlas = dd.t || [];
    const coll = dd.c || [];
    const all = [...spells, ...atlas]; // main deck (avatar shown above; collection is sideboard)
    const totalMain = all.reduce((s,[,q]) => s + (q||0), 0);
    if (!totalMain) { panel.innerHTML = ''; return; }

    // Mana curve from spellbook (cards with a cost), bucket 7+
    const curve = {}; let costSum = 0, costCards = 0;
    spells.forEach(([name, qty]) => {
      const c = cardMap[(name||'').toLowerCase()];
      if (!c || c.cost == null || c.cost === '') return;
      const cost = Number(c.cost);
      const key = cost >= 7 ? '7+' : String(cost);
      curve[key] = (curve[key] || 0) + qty;
      costSum += cost * qty; costCards += qty;
    });
    const avgCost = costCards ? (costSum / costCards).toFixed(1) : '—';

    // Threshold requirements, tracked PER mana-cost bucket (the most demanding single
    // card at each cost). We also record, for each element, the HIGHEST threshold the
    // deck demands and the mana cost where that peak first occurs.
    const THRESH_ELS = ['air','earth','fire','water'];
    const imgMap = { air:'wind.png', earth:'earth.png', fire:'fire.png', water:'water.png' };
    const curveThr = {};   // bucket key → { air, earth, fire, water } max
    const thr = { air:0, earth:0, fire:0, water:0 };       // overall max per element
    const thrPeakCost = { air:null, earth:null, fire:null, water:null }; // cost at which the peak occurs
    // record a card's thresholds, attributing the cost where a new peak is set
    const recordThresholds = (cardThresholds, cost, bucketKey) => {
      if (!cardThresholds) return;
      if (bucketKey != null) {
        const bt = curveThr[bucketKey] || (curveThr[bucketKey] = { air:0, earth:0, fire:0, water:0 });
        for (const [k,v] of Object.entries(cardThresholds)) { const kk=k.toLowerCase(); if (bt[kk]!=null) bt[kk]=Math.max(bt[kk], v||0); }
      }
      for (const [k,v] of Object.entries(cardThresholds)) {
        const kk = k.toLowerCase();
        if (thr[kk] == null) continue;
        if ((v||0) > thr[kk]) { thr[kk] = v||0; thrPeakCost[kk] = cost; }   // new higher peak → remember its cost
      }
    };
    spells.forEach(([name]) => {
      const c = cardMap[(name||'').toLowerCase()];
      if (!c) return;
      const cost = (c.cost == null || c.cost === '') ? null : Number(c.cost);
      const bucketKey = cost == null ? null : (cost >= 7 ? '7+' : String(cost));
      recordThresholds(c.thresholds, cost, bucketKey);
    });
    // Sites & collection feed the overall peak too (sites have no cost → peak cost stays null)
    [...atlas, ...coll].forEach(([name]) => {
      const c = cardMap[(name||'').toLowerCase()];
      if (!c) return;
      const cost = (c.cost == null || c.cost === '') ? null : Number(c.cost);
      recordThresholds(c.thresholds, cost, null);
    });

    // Repeated-symbol renderer — ALWAYS shows N symbols, never "N Water" text.
    const symbols = (obj, size) => {
      const cls = size === 'big' ? 'tstat-icon-big' : 'tstat-icon';
      let out = '';
      THRESH_ELS.forEach(el => { for (let i=0;i<(obj[el]||0);i++) out += `<img src="${imgMap[el]}" alt="${el}" class="${cls}">`; });
      return out;
    };

    const curveKeys = ['0','1','2','3','4','5','6','7+'];
    const curveMax = Math.max(1, ...curveKeys.map(k => curve[k]||0));
    const curveBars = curveKeys.map(k => {
      const v = curve[k] || 0;
      const bt = curveThr[k];
      const syms = bt ? symbols(bt, 'small') : '';
      return `<div class="curve-row">
        <span class="curve-label">${k}${k==='7+'?'':' cost'}</span>
        <div class="curve-track"><div class="curve-fill" style="width:${(v/curveMax*100)}%"></div></div>
        <span class="curve-val">${v}</span>
        <span class="curve-thr">${syms}</span>
      </div>`;
    }).join('');

    // Per-element peak: repeated symbols + the mana cost where that peak occurs.
    const peakRows = THRESH_ELS.filter(el => thr[el] > 0).map(el => {
      const syms = Array.from({length: thr[el]}, () => `<img src="${imgMap[el]}" alt="${el}" class="tstat-icon-big">`).join('');
      const cost = thrPeakCost[el];
      const costLabel = (cost == null)
        ? `<span class="peak-cost peak-cost-site">from a site</span>`
        : `<span class="peak-cost">at <b>${cost}</b> cost</span>`;
      return `<div class="peak-row"><span class="peak-syms">${syms}</span>${costLabel}</div>`;
    }).join('');
    const thrHtml = peakRows || '<div style="color:var(--rune);font-style:italic;font-size:0.85rem;">No threshold requirements</div>';

    const spellCount = spells.reduce((s,[,q])=>s+(q||0),0);
    const atlasCount = atlas.reduce((s,[,q])=>s+(q||0),0);
    const collCount = coll.reduce((s,[,q])=>s+(q||0),0);

    // Spell type breakdown (spellbook only, not sites) → quick-stat items
    const spellTypeCount = {};
    spells.forEach(([name, q]) => {
      const c = cardMap[(name||'').toLowerCase()];
      const t = (c && c.type) ? c.type : 'Other';
      spellTypeCount[t] = (spellTypeCount[t] || 0) + (q || 0);
    });
    const typeOrder = ['Minion','Magic','Artifact','Aura','Other'];
    const typeItems = Object.entries(spellTypeCount)
      .sort((a,b) => (typeOrder.indexOf(a[0])+1||99) - (typeOrder.indexOf(b[0])+1||99))
      .map(([t,n]) => `<div class="stat-quick-item stat-quick-type"><b>${n}</b><span>${escHtml(t)}${n===1?'':'s'}</span></div>`)
      .join('');

    // Element distribution pie (reuses the same breakdown as the hero element bar)
    const elBreakdown = deckElementBreakdown(dd);   // [{el, pct}], sorted desc
    let pieHtml;
    if (elBreakdown.length) {
      const R = 52, CX = 60, CY = 60, INNER = 30; // donut
      let acc = 0;
      const segs = elBreakdown.map(({el, pct}) => {
        const frac = pct / 100;
        const a0 = acc * 2 * Math.PI - Math.PI/2;
        acc += frac;
        const a1 = acc * 2 * Math.PI - Math.PI/2;
        const large = frac > 0.5 ? 1 : 0;
        const x0 = CX + R*Math.cos(a0), y0 = CY + R*Math.sin(a0);
        const x1 = CX + R*Math.cos(a1), y1 = CY + R*Math.sin(a1);
        // full-circle guard (single element = 100%)
        if (frac >= 0.999) {
          return `<circle cx="${CX}" cy="${CY}" r="${R}" fill="${ELEMENT_COLORS[el]}"></circle>`;
        }
        return `<path d="M ${CX} ${CY} L ${x0.toFixed(2)} ${y0.toFixed(2)} A ${R} ${R} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z" fill="${ELEMENT_COLORS[el]}"></path>`;
      }).join('');
      const top = elBreakdown[0];
      const legend = elBreakdown.map(({el, pct}) =>
        `<div class="pie-leg-item"><span class="pie-leg-dot" style="background:${ELEMENT_COLORS[el]}"></span>${el.charAt(0).toUpperCase()+el.slice(1)} <b>${Math.round(pct)}%</b></div>`
      ).join('');
      pieHtml = `<div class="pie-wrap">
        <svg viewBox="0 0 120 120" class="pie-svg" role="img" aria-label="Element distribution">
          ${segs}
          <circle cx="${CX}" cy="${CY}" r="${INNER}" fill="var(--abyss)"></circle>
          <text x="${CX}" y="${CY-3}" text-anchor="middle" class="pie-center-pct">${Math.round(top.pct)}%</text>
          <text x="${CX}" y="${CY+11}" text-anchor="middle" class="pie-center-el">${top.el.charAt(0).toUpperCase()+top.el.slice(1)}</text>
        </svg>
        <div class="pie-legend">${legend}</div>
      </div>`;
    } else {
      pieHtml = '<div style="color:var(--rune);font-style:italic;font-size:0.85rem;">No element data</div>';
    }

    const collapsed = collapsedSections['Deck Stats'] ? ' collapsed' : '';
    panel.innerHTML = `<div class="deck-section deck-stats-section${collapsed}" id="section-Deck-Stats">
      <div class="deck-section-head" onclick="toggleSection('Deck Stats')">
        <span class="deck-section-title"><span class="deck-section-caret">▾</span>Deck Stats</span>
      </div>
      <div class="deck-section-body">
        <div class="deck-stats-panel">
          <div class="stat-quick">
            <div class="stat-quick-item"><b>${totalMain}</b><span>Main Deck</span></div>
            <div class="stat-quick-item"><b>${spellCount}</b><span>Spells</span></div>
            <div class="stat-quick-item"><b>${atlasCount}</b><span>Sites</span></div>
            <div class="stat-quick-item"><b>${collCount}</b><span>Collection</span></div>
            <div class="stat-quick-item"><b>${avgCost}</b><span>Avg Cost</span></div>
            <div class="stat-quick-divider"></div>
            ${typeItems}
          </div>
          <div class="stat-block">
            <div class="stat-block-title">Mana Curve &amp; Thresholds</div>
            ${curveBars}
          </div>
          <div class="stat-block">
            <div class="stat-block-title">Peak Threshold by Element</div>
            <div class="thr-summary">${thrHtml}</div>
          </div>
          <div class="stat-block">
            <div class="stat-block-title">Element Distribution</div>
            ${pieHtml}
          </div>
        </div>
      </div>
    </div>`;
  }

  function renderSections() {
    const dd = currentDeck.deck_data || {};
    renderDeckStats(dd);
    let html = '';
    // Avatar is already shown as the hero image + name at the top, so we don't
    // repeat it as a section here. (The .txt export builds it separately from dd.a.)
    // Atlas — show site count, e.g. "30 cards (30 sites)"
    const atlasCount = (dd.t || []).reduce((s,[,q]) => s + (q||0), 0);
    html += renderSectionBlock('Atlas', dd.t || [], { paren: `${atlasCount} site${atlasCount===1?'':'s'}` });
    // Spellbook — break down by type, e.g. "60 cards (38 minions, 18 magics, 4 artifacts)"
    html += renderSectionBlock('Spellbook', dd.s || [], { breakdown: 'type' });
    // Deck Collection (only if present)
    if ((dd.c || []).length) {
      html += renderSectionBlock('Collection', dd.c || [], { limit: 'sideboard, up to 10' });
    }
    document.getElementById('deck-sections').innerHTML = html;
  }

  function renderHero() {
    const dd = currentDeck.deck_data || {};
    const av = avatarName(dd);
    const avImg = av ? imgUrl(av) : null;
    const heroAv = document.getElementById('hero-avatar');
    if (avImg) {
      heroAv.classList.remove('placeholder');
      heroAv.innerHTML = `<img src="${avImg}" alt="${escHtml(av)}" onerror="this.parentElement.classList.add('placeholder');this.parentElement.innerHTML='No Avatar'">`;
    }
    document.getElementById('hero-name').textContent = currentDeck.name || 'Untitled Deck';
    const author = currentDeck._author || '';
    document.getElementById('hero-author').innerHTML = author
      ? `by <a href="profile.html?u=${encodeURIComponent(author)}" class="hero-author-link"><b>${escHtml(author)}</b></a>`
      : '';
    document.getElementById('hero-avatar-name').innerHTML = av
      ? `<a href="avatar.html?a=${encodeURIComponent(av)}" class="hero-avatar-link">${escHtml(av)}</a>`
      : '';

    // counts
    const aC = sectionCount(dd,'a'), tC = sectionCount(dd,'t'), sC = sectionCount(dd,'s'), cC = sectionCount(dd,'c');
    const pills = [];
    pills.push(`<div class="deck-count-pill ${tC>=30?'ok':'warn'}"><b>${tC}</b>/30 Atlas</div>`);
    pills.push(`<div class="deck-count-pill ${sC>=60?'ok':'warn'}"><b>${sC}</b>/60 Spellbook</div>`);
    pills.push(`<div class="deck-count-pill ${cC<=10?'ok':'warn'}"><b>${cC}</b>/10 Collection</div>`);
    pills.push(`<div class="deck-count-pill"><b>${aC+tC+sC+cC}</b> total</div>`);
    document.getElementById('hero-counts').innerHTML = pills.join('');

    // element bar
    const breakdown = deckElementBreakdown(dd);
    if (breakdown.length) {
      document.getElementById('hero-elements').style.display = '';
      document.getElementById('hero-el-bar').innerHTML = breakdown.map(b =>
        `<div class="el-seg" style="width:${b.pct.toFixed(1)}%;background:${ELEMENT_COLORS[b.el]};"></div>`).join('');
      document.getElementById('hero-el-labels').innerHTML = breakdown.map(b =>
        `<span class="el-label"><span class="el-dot" style="background:${ELEMENT_COLORS[b.el]};"></span>${b.el.charAt(0).toUpperCase()+b.el.slice(1)} ${Math.round(b.pct)}%</span>`).join('');
    }

    // actions
    const isOwner = currentUser && currentDeck.owner_id === currentUser.id;
    const acts = [];
    if (isOwner) {
      acts.push(`<button class="btn btn-primary" onclick="window.location.href='deckbuilder.html?d=${currentDeck.short_code}'">✎ Edit in Workshop</button>`);
    } else {
      acts.push(`<button class="btn btn-primary" onclick="openCopyConfirm()">Bring to Workshop</button>`);
    }
    // Like button — shows the count for everyone; togglable when logged in & not your own deck
    acts.push(`<button class="like-btn" id="like-btn" onclick="toggleLike()"><span class="heart">♡</span> <span id="like-count" class="like-count-badge">0</span></button>`);
    // Views counter — read-only, shown to everyone
    acts.push(`<span class="views-badge" title="Deck views"><span class="views-eye">👁</span> <span id="view-count" class="views-count-badge">${currentDeck.views || 0}</span></span>`);
    acts.push(`<button class="btn btn-ghost" onclick="copyDeckLink()">🔗 Copy Link</button>`);
    acts.push(`<button class="btn btn-ghost" onclick="history.length>1?history.back():window.location.href='archive.html'">← Back</button>`);
    document.getElementById('hero-actions').innerHTML = acts.join('');
    refreshLikes();
    registerView();

    // view toggle initial state
    ['list','details','grid','large'].forEach(m => {
      const btn = document.getElementById('vm-' + m);
      if (btn) btn.classList.toggle('active', deckView === m);
    });
  }

  // ── Lightbox ──
  // Open the full card-detail modal (same info as the card explorer)
  function zoom(name) { openCardModal(name); }

  const THRESHOLD_LABEL = { air:'Air', earth:'Earth', fire:'Fire', water:'Water' };
  function openCardModal(name) {
    const c = cardMap[(name||'').toLowerCase()];
    hidePreview();
    const overlay = document.getElementById('card-modal-overlay');
    const modal = document.getElementById('card-modal');
    const imgWrap = document.getElementById('card-modal-img-wrap');
    const img = document.getElementById('card-modal-img');
    img.src = imgUrl(name);
    img.alt = name;
    // Fall back to a bare image if we have no card data
    if (!c) {
      modal.className = 'card-modal';
      document.getElementById('card-modal-name').textContent = name;
      document.getElementById('card-modal-type').textContent = '';
      document.getElementById('card-modal-stats').innerHTML = '';
      document.getElementById('card-modal-text').textContent = '';
      overlay.classList.add('open');
      return;
    }
    const site = (c.type || '').toLowerCase() === 'site';
    modal.className = site ? 'card-modal site-modal' : 'card-modal';
    document.getElementById('card-modal-name').textContent = c.name;
    document.getElementById('card-modal-type').textContent = [c.type, c.set].filter(Boolean).join(' · ');
    document.getElementById('card-modal-text').textContent = c.rules_text || '';
    const stats = [];
    if (c.cost != null) stats.push(['Cost', c.cost]);
    if (c.attack != null) stats.push(['Attack', c.attack]);
    if (c.defence != null) stats.push(['Defence', c.defence]);
    if (c.life != null) stats.push(['Life', c.life]);
    if (c.rarity) stats.push(['Rarity', c.rarity]);
    if (c.element) stats.push(['Element', c.element]);
    if (c.subTypes) stats.push(['Subtype', c.subTypes]);
    // Threshold shown with the element symbols
    const thSyms = thresholdSymbols(name, 'th-row-icon').join('');
    let statHtml = stats.map(([l,v]) => `<div class="card-modal-stat"><b>${l}</b>${v}</div>`).join('');
    if (thSyms) statHtml += `<div class="card-modal-stat"><b>Threshold</b>${thSyms}</div>`;
    document.getElementById('card-modal-stats').innerHTML = statHtml;
    overlay.classList.add('open');
  }
  function closeCardModal() { document.getElementById('card-modal-overlay').classList.remove('open'); }

  // ── Hover preview (desktop) ──
  let previewEl, previewImg, previewVisible = false;
  function showPreview(name, x, y) {
    if (!previewEl) { previewEl = document.getElementById('hover-preview'); previewImg = document.getElementById('hover-preview-img'); }
    if (previewImg.dataset.for !== name) { previewImg.src = imgUrl(name); previewImg.dataset.for = name; }
    previewEl.classList.toggle('is-site', isSite(name));
    positionPreview(x, y);
    previewEl.classList.add('show');
    previewVisible = true;
  }
  function positionPreview(x, y) {
    if (!previewEl) return;
    const pad = 18;
    const pw = previewEl.offsetWidth || 290, ph = previewEl.offsetHeight || 400;
    let left = x + pad, top = y + pad;
    if (left + pw > window.innerWidth - 8) left = x - pw - pad;   // flip to left of cursor
    if (top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;
    if (top < 8) top = 8;
    previewEl.style.left = left + 'px';
    previewEl.style.top = top + 'px';
  }
  function hidePreview() {
    if (previewEl) previewEl.classList.remove('show');
    previewVisible = false;
  }
  // Delegated hover on the deck sections
  function wireHover() {
    const root = document.getElementById('deck-sections');
    if (!root) return;
    root.addEventListener('mouseover', e => {
      const cell = e.target.closest('[data-card]');
      if (!cell) return;
      showPreview(cell.getAttribute('data-card'), e.clientX, e.clientY);
    });
    root.addEventListener('mousemove', e => {
      if (!previewVisible) return;
      const cell = e.target.closest('[data-card]');
      if (!cell) { hidePreview(); return; }
      positionPreview(e.clientX, e.clientY);
    });
    root.addEventListener('mouseout', e => {
      const to = e.relatedTarget;
      if (!to || !to.closest || !to.closest('[data-card]')) hidePreview();
    });
  }

  // ── Download .txt ──
  function downloadDeckText() {
    const dd = currentDeck.deck_data || {};
    const lines = [`// ${currentDeck.name || 'Deck'}`, ''];
    const sec = (label, arr) => { if ((arr||[]).length) { lines.push(`// ${label}`); arr.forEach(([n,q]) => lines.push(`${q}x ${n}`)); lines.push(''); } };
    sec('Avatar', dd.a); sec('Atlas (Sites)', dd.t); sec('Spellbook', dd.s); sec('Collection (Sideboard)', dd.c);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([lines.join('\n')], {type:'text/plain'}));
    a.download = (currentDeck.name||'deck').replace(/\s+/g,'_') + '.txt';
    a.click();
    toast('Deck downloaded');
  }

  function copyDeckLink() {
    // Share via the Worker host so social platforms (Discord, etc.) get a per-deck
    // preview. The Worker shows the preview to crawlers and redirects people to the
    // real deck page. Everything else on the site keeps using cursedrealm.org.
    const url = `https://cursed-realm-og.pufftreees.workers.dev/d/${currentDeck.short_code}`;
    navigator.clipboard.writeText(url).then(() => toast('Link copied!'), () => window.prompt('Copy link:', url));
  }

  // ── Bring to My Workshop ──
  function openCopyConfirm() {
    if (!currentUser) {
      toast('Sign in to bring decks to your Workshop');
      setTimeout(() => { window.location.href = 'decks.html'; }, 1200);
      return;
    }
    document.getElementById('copy-msg').innerHTML = `This will save a personal copy of <b>${escHtml(currentDeck.name||'this deck')}</b> to your Workshop, where you can edit it freely. The original stays untouched.`;
    document.getElementById('copy-overlay').classList.add('open');
  }
  function closeCopyConfirm() { document.getElementById('copy-overlay').classList.remove('open'); }

  function genShortCode() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let s = ''; for (let i=0;i<7;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  async function confirmBringToWorkshop() {
    if (!currentUser || !supa) return;
    const btn = document.getElementById('copy-confirm-btn');
    btn.disabled = true; btn.style.opacity = '0.6';
    try {
      const newData = JSON.parse(JSON.stringify(currentDeck.deck_data || {}));
      const newName = (currentDeck.name || 'Deck') + ' (copy)';
      newData.n = newName;
      const row = {
        short_code: genShortCode(),
        name: newName,
        deck_data: newData,
        owner_id: currentUser.id,
        is_public: false,
        is_saved: true
      };
      const { error } = await supa.from('decks').insert(row);
      if (error) throw error;
      closeCopyConfirm();
      toast('Brought to your Workshop!');
      setTimeout(() => { window.location.href = 'decks.html'; }, 1000);
    } catch (e) {
      console.warn(e);
      toast('Could not copy the deck');
      btn.disabled = false; btn.style.opacity = '1';
    }
  }

  // ── Auth bar (minimal) ──
  async function refreshUser() {
    if (!supa) return;
    try {
      const { data } = await supa.auth.getUser();
      if (data && data.user) {
        let username = data.user.email;
        try { const { data: prof } = await supa.from('profiles').select('username').eq('id', data.user.id).single(); if (prof && prof.username) username = prof.username; } catch(e){}
        currentUser = { id: data.user.id, email: data.user.email, username };
      } else currentUser = null;
    } catch (e) { currentUser = null; }
  }
  function renderAuthBar() {
    const bar = document.getElementById('auth-bar');
    if (!bar) return;
    if (currentUser) {
      bar.innerHTML = `<a href="profile.html?u=${encodeURIComponent(currentUser.username)}" class="header-link" style="color:var(--gold)">${escHtml(currentUser.username)}</a>`;
    } else {
      bar.innerHTML = `<a href="decks.html" class="header-link">Sign In</a>`;
    }
  }

  // ── Load the deck ──
  async function loadDeck() {
    const code = new URLSearchParams(window.location.search).get('d');
    const statusEl = document.getElementById('deck-status');
    if (!code) { statusEl.innerHTML = 'No deck specified.'; return; }
    if (!supa) { statusEl.innerHTML = 'Could not connect.'; return; }
    try {
      const { data: deckRow, error } = await supa.from('decks').select('*').eq('short_code', code).single();
      if (error || !deckRow) { statusEl.innerHTML = 'Deck not found.'; return; }
      currentDeck = deckRow;
      // resolve author
      if (deckRow.owner_id) {
        try {
          const { data: prof } = await supa.from('profiles').select('username').eq('id', deckRow.owner_id).single();
          currentDeck._author = prof && prof.username ? prof.username : null;
        } catch(e) { currentDeck._author = null; }
      }
      document.title = `${currentDeck.name || 'Deck'} — Cursed Realm`;
      renderHero();
      renderSections();
      renderScrollPanel();
      applyScrollLayout();
      renderComments();
      statusEl.style.display = 'none';
      document.getElementById('deck-content').style.display = '';
      wireHover();
    } catch (e) {
      console.warn(e);
      statusEl.innerHTML = 'Could not load the deck.';
    }
  }

  // ── Likes ──
  let likedByMe = false, likeBusy = false;
  // Count a view the first time a deck is opened in this browser session.
  // Persisted via a SECURITY DEFINER RPC (increment_deck_views) so anonymous
  // viewers can bump the counter safely; if the RPC isn't installed yet the
  // call fails quietly and the count still reflects what's stored.
  function registerView() {
    if (!supa || !currentDeck || !currentDeck.is_public) return;
    const code = currentDeck.short_code;
    const key = 'viewed_deck_' + code;
    try { if (sessionStorage.getItem(key)) return; } catch(e) {}
    try { sessionStorage.setItem(key, '1'); } catch(e) {}
    // Optimistic UI bump
    currentDeck.views = (currentDeck.views || 0) + 1;
    const vc = document.getElementById('view-count');
    if (vc) vc.textContent = currentDeck.views;
    // Persist (ignored silently if the RPC isn't present)
    try { supa.rpc('increment_deck_views', { deck_code: code }).then(() => {}, () => {}); } catch(e) {}
  }

  async function refreshLikes() {
    const btn = document.getElementById('like-btn');
    const countEl = document.getElementById('like-count');
    if (!btn || !supa || !currentDeck) return;
    try {
      // total count for this deck
      const { count } = await supa.from('deck_likes').select('*', { count: 'exact', head: true }).eq('deck_id', currentDeck.id);
      if (countEl) countEl.textContent = count || 0;
      // did the current user like it?
      if (currentUser) {
        const { data } = await supa.from('deck_likes').select('id').eq('deck_id', currentDeck.id).eq('user_id', currentUser.id).limit(1);
        likedByMe = !!(data && data.length);
      } else likedByMe = false;
      applyLikeState();
    } catch(e) { /* table may not exist yet */ }
  }
  function applyLikeState() {
    const btn = document.getElementById('like-btn');
    if (!btn) return;
    const isOwner = currentUser && currentDeck.owner_id === currentUser.id;
    btn.classList.toggle('liked', likedByMe);
    btn.querySelector('.heart').textContent = likedByMe ? '♥' : '♡';
    // owners can't like their own deck; logged-out users see count but can't toggle
    btn.disabled = !currentUser || isOwner;
    btn.title = !currentUser ? 'Sign in to like decks' : (isOwner ? "You can't like your own deck" : (likedByMe ? 'Unlike' : 'Like this deck'));
  }
  async function toggleLike() {
    if (likeBusy || !currentUser || !currentDeck) return;
    const isOwner = currentDeck.owner_id === currentUser.id;
    if (isOwner) return;
    likeBusy = true;
    const countEl = document.getElementById('like-count');
    try {
      if (likedByMe) {
        await supa.from('deck_likes').delete().eq('deck_id', currentDeck.id).eq('user_id', currentUser.id);
        likedByMe = false;
        if (countEl) countEl.textContent = Math.max(0, (parseInt(countEl.textContent)||0) - 1);
      } else {
        await supa.from('deck_likes').insert({ deck_id: currentDeck.id, user_id: currentUser.id });
        likedByMe = true;
        if (countEl) countEl.textContent = (parseInt(countEl.textContent)||0) + 1;
      }
      applyLikeState();
    } catch(e) { /* ignore */ }
    likeBusy = false;
  }

  // ── COMMENTS ──
  let commentsBusy = false;

  async function renderComments() {
    const wrap = document.getElementById('deck-comments');
    if (!wrap || !supa || !currentDeck) return;
    // Comments only on public decks (read RLS requires is_public)
    if (!currentDeck.is_public) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
    wrap.style.display = '';

    let rows = [];
    try {
      const { data, error } = await supa
        .from('deck_comments')
        .select('id, user_id, parent_id, body, created_at')
        .eq('deck_id', currentDeck.id)
        .order('created_at', { ascending: true });
      if (error) throw error;
      rows = data || [];
    } catch(e) { rows = []; /* table may not exist yet */ }

    // Resolve usernames
    const ids = [...new Set(rows.map(r => r.user_id).filter(Boolean))];
    const names = {};
    if (ids.length) {
      try {
        const { data: profs } = await supa.from('profiles').select('id, username').in('id', ids);
        (profs || []).forEach(p => names[p.id] = p.username);
      } catch(e) {}
    }

    const ownerId = currentDeck.owner_id;
    const tops = rows.filter(r => !r.parent_id);
    const repliesByParent = {};
    rows.filter(r => r.parent_id).forEach(r => { (repliesByParent[r.parent_id] = repliesByParent[r.parent_id] || []).push(r); });

    let html = `<div class="comments-head">Comments <span class="cc-count">${rows.length ? '· ' + rows.length : ''}</span></div>`;
    if (currentUser) {
      html += `<div class="comment-form">
        <textarea class="comment-input" id="comment-new" maxlength="2000" placeholder="Add a comment…"></textarea>
        <div class="comment-form-actions"><button class="btn btn-primary" onclick="postComment(null)">Post Comment</button></div>
      </div>`;
    } else {
      html += `<div class="comment-signin">Sign in to join the conversation. <a href="decks.html">Sign in</a></div>`;
    }

    if (!tops.length) {
      html += `<div class="comment-empty">No comments yet — be the first to share your thoughts.</div>`;
    } else {
      html += '<div class="comment-list">';
      tops.forEach(c => {
        html += renderCommentNode(c, names, ownerId, false);
        (repliesByParent[c.id] || []).forEach(r => { html += renderCommentNode(r, names, ownerId, true); });
      });
      html += '</div>';
    }
    wrap.innerHTML = html;
  }

  function renderCommentNode(c, names, ownerId, isReply) {
    const uname = names[c.user_id] || 'Unknown';
    const isAuthor = c.user_id && c.user_id === ownerId;
    const canDelete = currentUser && (currentUser.id === c.user_id || (currentDeck && currentUser.id === currentDeck.owner_id));
    const canReply = currentUser && !isReply; // one level of threading
    const authorLink = `<a class="comment-author" href="profile.html?u=${encodeURIComponent(uname)}">${escHtml(uname)}</a>`;
    const badge = isAuthor ? '<span class="comment-author-badge">Author</span>' : '';
    let actions = '';
    if (canReply) actions += `<button class="comment-action" onclick="toggleReplyBox('${c.id}')">Reply</button>`;
    if (canDelete) actions += `<button class="comment-action danger" onclick="deleteComment('${c.id}')">Delete</button>`;
    return `<div class="comment${isReply ? ' is-reply' : ''}" data-id="${c.id}">
      <div class="comment-top">${authorLink}${badge}<span class="comment-time">${timeAgo(c.created_at)}</span></div>
      <div class="comment-body">${escHtml(c.body)}</div>
      ${actions ? `<div class="comment-actions">${actions}</div>` : ''}
      <div class="comment-reply-slot" id="reply-slot-${c.id}"></div>
    </div>`;
  }

  function toggleReplyBox(parentId) {
    if (!currentUser) return;
    const slot = document.getElementById('reply-slot-' + parentId);
    if (!slot) return;
    if (slot.dataset.open === '1') { slot.innerHTML = ''; slot.dataset.open = '0'; return; }
    slot.dataset.open = '1';
    slot.innerHTML = `<div class="comment-reply-box">
      <textarea class="comment-input" id="reply-input-${parentId}" maxlength="2000" placeholder="Write a reply…"></textarea>
      <div class="comment-form-actions" style="margin-top:8px;">
        <button class="btn btn-primary" onclick="postComment('${parentId}')">Reply</button>
        <button class="btn btn-ghost" onclick="toggleReplyBox('${parentId}')">Cancel</button>
      </div>
    </div>`;
    const ta = document.getElementById('reply-input-' + parentId); if (ta) ta.focus();
  }

  async function postComment(parentId) {
    if (commentsBusy || !currentUser || !supa || !currentDeck) return;
    const ta = document.getElementById(parentId ? 'reply-input-' + parentId : 'comment-new');
    if (!ta) return;
    const body = ta.value.trim();
    if (!body) { toast('Write something first'); return; }
    commentsBusy = true;
    try {
      const { error } = await supa.from('deck_comments').insert({
        deck_id: currentDeck.id, user_id: currentUser.id, parent_id: parentId || null, body
      });
      if (error) throw error;
      toast('Comment posted');
      await renderComments();
    } catch(e) { console.warn(e); toast('Could not post comment — is the comments table set up?'); }
    commentsBusy = false;
  }

  async function deleteComment(id) {
    if (commentsBusy || !currentUser || !supa) return;
    if (!confirm('Delete this comment?')) return;
    commentsBusy = true;
    try {
      const { error } = await supa.from('deck_comments').delete().eq('id', id);
      if (error) throw error;
      await renderComments();
    } catch(e) { console.warn(e); toast('Could not delete comment'); }
    commentsBusy = false;
  }

  function timeAgo(ts) {
    const d = new Date(ts), now = new Date();
    const s = Math.floor((now - d) / 1000);
    if (s < 60) return 'just now';
    const m = Math.floor(s/60); if (m < 60) return m + 'm ago';
    const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
    const days = Math.floor(h/24); if (days < 30) return days + 'd ago';
    return d.toLocaleDateString();
  }

  // ── utils ──
  function escHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escAttr(s){ return String(s==null?'':s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
  function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2400); }

  document.addEventListener('keydown', e => { if (e.key==='Escape'){ document.getElementById('lightbox').classList.remove('open'); closeCopyConfirm(); closeCardModal(); } });

  // ── INIT ──
  (async function init() {
    renderAuthBar();
    if (showThresholds) document.body.classList.add('show-thresholds');
    await Promise.all([loadCards(), refreshUser()]);
    renderAuthBar();
    await loadDeck();
    if (supa) supa.auth.onAuthStateChange((ev) => { if (ev==='SIGNED_IN'||ev==='SIGNED_OUT') refreshUser().then(()=>{renderAuthBar(); if(currentDeck){ renderHero(); renderComments(); }}); });
  })();
</script>
</body>
