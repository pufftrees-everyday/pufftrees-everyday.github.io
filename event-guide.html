<div class="page">
  <div class="rb-hero">
    <h1 class="rb-title">Guide to Sorcery Events</h1>
    <p class="rb-sub" id="rb-subtitle">Loading…</p>
  </div>

  <div class="rb-controls">
    <div class="rb-search-wrap">
      <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M12.9 14.32a8 8 0 111.41-1.41l4.42 4.41-1.41 1.42-4.42-4.42zM8 14A6 6 0 108 2a6 6 0 000 12z"/></svg>
      <input type="search" id="rb-search" class="rb-search" placeholder="Search the event guide…" aria-label="Search the event guide" autocomplete="off">
    </div>
    <div class="rb-pagejump">
      <label for="rb-page">Page</label>
      <input type="number" id="rb-page" inputmode="numeric" aria-label="Jump to a page number">
      <button class="btn btn-ghost btn-sm" onclick="jumpToPage()">Go</button>
    </div>
    <span class="rb-count" id="rb-count" aria-live="polite"></span>
  </div>

  <button class="rb-toc-toggle" id="rb-toc-toggle" aria-expanded="false" aria-controls="rb-toc" onclick="toggleToc()">☰ Contents</button>

  <div class="rb-layout">
    <nav class="rb-toc" id="rb-toc" aria-label="Table of contents"></nav>
    <main class="rb-content" id="rb-content">
      <div class="rb-status">Summoning the event guide…</div>
    </main>
  </div>

  <p class="rb-credit" id="rb-credit">
    Official tournament rules by <a href="https://sorcerytcg.com/" target="_blank" rel="noopener">Erik's Curiosa</a> —

  </p>
</div>

<script>
  // ── Nav helpers (shared with the rest of the site) ──
  function toggleMobileNav() { document.getElementById('mobile-nav').classList.toggle('open'); }
  function toggleMoreMenu(e){
    if(e) e.stopPropagation();
    var d=document.getElementById('more-dropdown'); if(!d) return;
    var open=d.classList.toggle('open');
    if(open){ setTimeout(function(){ document.addEventListener('click', moreMenuOutside); },0); }
    else { document.removeEventListener('click', moreMenuOutside); }
  }
  function moreMenuOutside(e){
    var d=document.getElementById('more-dropdown');
    if(d && !d.classList.contains('open')) return;
    if(d && !e.target.closest('.more-menu')){ d.classList.remove('open'); document.removeEventListener('click', moreMenuOutside); }
  }
  // Auth bar (matches other pages)
  (async function initAuth(){
    if(!window.CR) return;
    CR.onAuthChange = () => { CR.renderAuthBar('auth-bar'); };
    try { await CR.refreshUser(); } catch(e) {}
    CR.renderAuthBar('auth-bar');
    if (CR.supa) CR.supa.auth.onAuthStateChange((ev) => { if(ev==='SIGNED_IN'||ev==='SIGNED_OUT') CR.refreshUser().then(()=>CR.renderAuthBar('auth-bar')); });
  })();

  // ── Event Guide engine config (search/TOC/page-jump live in rulebook-engine.js) ──
  window.RB_CONFIG = {
    json: 'event-guide-content.json',
    fallbackTitle: 'Guide to Sorcery Events',
    releasedLabel: '',
    noun: 'event guide',
    resultNoun: 'sections'
  };
</script>
<script src="rulebook-engine.js?v=1"></script>
