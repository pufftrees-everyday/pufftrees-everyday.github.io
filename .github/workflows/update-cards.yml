name: Update card data

# Refreshes cards.json from Sorcery's public API so new releases (e.g. Dust-store
# sites) appear on the site. Runs daily, and can be triggered manually.
on:
  schedule:
    # Once a day at 05:17 UTC (card releases are infrequent; daily is plenty).
    - cron: '17 5 * * *'
  workflow_dispatch:   # run on-demand from the GitHub Actions tab

permissions:
  contents: write

# Never let two card runs overlap (they'd race on the cards.json push).
concurrency:
  group: update-cards
  cancel-in-progress: false

jobs:
  update-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the rebase-before-push below works

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest cards from Sorcery API
        run: node fetch-cards.js

      - name: Commit and push updated cards.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit if cards.json actually changed
          if git diff --quiet -- cards.json; then
            echo "No card changes — nothing to commit."
          else
            git add cards.json
            git commit -m "Auto-update card data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # Resilient to concurrent pushes: rebase onto latest main and retry.
            pushed=""
            for i in 1 2 3 4 5; do
              git fetch origin main || true
              git rebase origin/main || { git rebase --abort || true; }
              if git push origin HEAD:main; then pushed="yes"; break; fi
              echo "push attempt $i failed; retrying in 5s…"; sleep 5
            done
            [ -n "$pushed" ] || echo "::warning::Could not push cards.json after retries."
          fi
