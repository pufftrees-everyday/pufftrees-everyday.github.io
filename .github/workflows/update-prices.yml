name: Update card prices

# Runs four times a day, and can also be triggered manually from the Actions tab.
on:
  schedule:
    # Every 6 hours (UTC). Minute :23 avoids the top-of-hour cron congestion
    # that delays GitHub-hosted scheduled runs. ~03:23 / 09:23 / 15:23 / 21:23.
    - cron: '23 3,9,15,21 * * *'
  workflow_dispatch:   # lets you run it on-demand from the GitHub Actions tab

# Allow the workflow to push the updated prices.json back to the repo
permissions:
  contents: write

# Never let two price runs overlap (they'd race on the prices.json push).
# Queue a new run behind any in-flight one instead of cancelling it.
concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the rebase-before-push below works

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest prices from JustTCG
        env:
          JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}
        run: node fetch-prices.js "$JUSTTCG_API_KEY" --fresh

      - name: Commit and push updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit if prices.json actually changed
          if git diff --quiet -- prices.json; then
            echo "No price changes — nothing to commit."
          else
            git add prices.json
            git commit -m "Auto-update card prices ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # Resilient to concurrent pushes (e.g. manual commits landing at the
            # same time): rebase onto the latest main and retry a few times.
            pushed=""
            for i in 1 2 3 4 5; do
              git fetch origin main || true
              git rebase origin/main || { git rebase --abort || true; }
              if git push origin HEAD:main; then pushed="yes"; break; fi
              echo "push attempt $i failed; retrying in 5s…"; sleep 5
            done
            [ -n "$pushed" ] || echo "::warning::Could not push prices.json after retries (history capture still runs)."
          fi

      # Append a snapshot to the Supabase price_history table for charts.
      # No-ops quietly until SUPABASE_SERVICE_ROLE is set, so it never blocks
      # the price update above. Runs LAST and ALWAYS — even if the commit/push
      # above failed — because the snapshot is independent of committing prices.json.
      - name: Record price history to Supabase
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: node record-price-history.js
