<style>
  a { color: var(--arcane); text-decoration: none; }
  a:hover { color: var(--shimmer); }
  :focus-visible { outline: 2px solid var(--arcane); outline-offset: 3px; border-radius: 4px; }

  /* ===== Tokens page content ===== */
  .shell { width: min(1180px, 94vw); margin: 0 auto; }

  .hero { text-align: center; padding: 64px 0 30px; }
  .hero-moon {
    width: 96px; height: 96px; margin: 0 auto 20px; display: block;
    filter: drop-shadow(0 0 26px rgba(155,135,212,0.55));
    animation: float 7s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-9px);} }
  .eyebrow { font-family: 'Cinzel', serif; letter-spacing: 0.32em; text-transform: uppercase; font-size: 0.72rem; color: var(--rune); margin-bottom: 14px; }
  .hero h1 { font-family: 'Cinzel Decorative', serif; font-weight: 700; font-size: clamp(2.3rem, 6vw, 3.4rem); line-height: 1.08; color: var(--parchment); margin-bottom: 16px; text-wrap: balance; }
  .hero-sub { max-width: 60ch; margin: 0 auto; font-size: 1.16rem; line-height: 1.55; color: var(--shimmer); text-wrap: pretty; }

  main { padding-bottom: 40px; }
  .token-section { padding: 30px 0; }
  .token-section + .token-section { border-top: 1px solid var(--border); }
  .token-section h2 { font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: 0.04em; font-size: 1.7rem; color: var(--gold); margin-bottom: 8px; text-wrap: balance; }
  .token-section .blurb { font-size: 1.08rem; color: var(--shimmer); max-width: 70ch; margin-bottom: 22px; line-height: 1.6; text-wrap: pretty; }

  /* CARD GRID (mirrors the Explorer / Vault) */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
  .card-thumb { cursor: pointer; border-radius: 6px; border: 1px solid var(--border); overflow: hidden; background: var(--dusk); transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; position: relative; }
  .card-thumb:hover { border-color: var(--arcane); transform: translateY(-2px); box-shadow: var(--glow-strong); }
  .card-thumb img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: var(--twilight); }
  .card-thumb-name { padding: 6px 8px; font-size: 0.86rem; color: var(--shimmer); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-thumb-meta { padding: 0 8px 7px; font-size: 0.72rem; color: var(--rune); font-style: italic; }
  /* Site tiles: landscape thumb, art rotated to read upright */
  .card-thumb.site .thumb-frame { aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: var(--twilight); }
  .card-thumb.site .thumb-frame img { position: absolute; width: 72%; aspect-ratio: 3/4; transform: rotate(90deg); object-fit: contain; }

  /* MODAL (mirrors the Explorer card modal) */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(11,10,15,0.85); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 18px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--dusk); border: 1px solid var(--border-strong); border-radius: 8px; box-shadow: 0 0 60px rgba(155,135,212,0.2); max-width: 880px; width: 100%; display: grid; grid-template-columns: auto 1fr; position: relative; overflow: hidden; max-height: 92vh; }
  .modal-img { background: var(--twilight); display: flex; align-items: center; justify-content: center; width: 340px; min-height: 340px; flex-shrink: 0; }
  .modal-img img { width: auto; max-width: 300px; height: auto; max-height: 82vh; object-fit: contain; display: block; }
  .modal.site-modal .modal-img { width: 440px; }
  .modal.site-modal .modal-img img { width: auto; max-width: none; height: 320px; max-height: 60vw; transform: rotate(90deg); object-fit: contain; }
  .modal-body { padding: 26px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .modal-name { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 600; color: var(--gold); line-height: 1.1; }
  .modal-type { font-size: 1.15rem; color: var(--arcane); font-style: italic; }
  .modal-stats { display: flex; flex-wrap: wrap; gap: 8px; }
  .modal-stat { font-size: 0.95rem; background: rgba(155,135,212,0.08); border: 1px solid var(--border); border-radius: 3px; padding: 4px 12px; color: var(--shimmer); }
  .modal-stat b { color: var(--arcane); }
  .modal-text { font-size: 1.05rem; color: var(--parchment); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 14px; white-space: pre-wrap; }
  .modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color:var(--rune); font-size: 1.7rem; line-height: 1; cursor: pointer; transition: color 0.15s; z-index: 2; }
  .modal-close:hover { color: var(--parchment); }
  @media (max-width: 640px) {
    .modal { grid-template-columns: 1fr; max-height: 90vh; overflow-y: auto; }
    .modal-img, .modal.site-modal .modal-img { width: 100%; min-height: auto; padding: 18px 0; }
    .modal-img img { width: 64%; max-width: 240px; }
    .modal.site-modal .modal-img img { width: 86%; max-width: none; height: auto; }
    .modal-body { padding: 18px; }
  }

  /* STATUS MARKERS */
  .markers { list-style: none; margin: 6px 0 0; padding: 0; }
  .markers li { display: grid; grid-template-columns: 140px 1fr; gap: 4px 20px; align-items: baseline; padding: 13px 2px; border-top: 1px solid var(--border); font-size: 1.05rem; color: var(--shimmer); }
  .markers li:first-child { border-top: none; }
  .markers .mk-name { font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: 0.03em; color: var(--gold); }
  .markers .mk-desc { line-height: 1.55; text-wrap: pretty; }

  .status-note { font-size: 0.98rem; color: #b8b0c8; margin-bottom: 18px; font-style: italic; }
  .load-status { text-align: center; padding: 50px 0; color: var(--rune); font-style: italic; }

  footer { border-top: 1px solid var(--border); margin-top: 24px; padding: 30px 0 60px; text-align: center; }
  footer .footmoon { width: 26px; height: 26px; opacity: 0.7; margin-bottom: 10px; }
  footer p { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mist); margin: 4px 0; }

  @media (max-width: 640px) {
    .hero { padding: 44px 0 24px; }
    .hero-moon { width: 80px; height: 80px; margin-bottom: 16px; }
    .hero-sub { font-size: 1.06rem; }
    .token-section { padding: 26px 0; }
    .token-section h2 { font-size: 1.42rem; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .markers li { grid-template-columns: 1fr; gap: 2px; }
  }

  @media (prefers-reduced-motion: reduce) { .hero-moon { animation: none; } }
</style>

<body>

<script>window.CRNav={active:'tokens'};</script>
<div id="cr-nav-mount"></div>
<script src="site-nav.js?v=3"></script>

<div class="shell">
  <!-- HERO -->
  <section class="hero">
    <img class="hero-moon" src="moon-glow.png" alt="The glowing crescent moon of Cursed Realm">
    <p class="eyebrow">Reference</p>
    <h1>Tokens</h1>
    <p class="hero-sub">The token and provided cards of <em>Sorcery: Contested Realm</em> — skeletons, frogs, foot soldiers, draft sites and provided avatars — plus the board states you track during play.</p>
  </section>

  <main id="token-main">
    <div class="load-status" id="load-status">Summoning tokens&hellip;</div>
  </main>

  <footer>
    <img class="footmoon" src="moon-glow.png" alt="" aria-hidden="true">
    <p>Cursed Realm</p>
    <p>A fan site for Sorcery: Contested Realm</p>
  </footer>
</div>

<!-- Card modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-card">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    <div class="modal-img"><img id="modal-img" src="" alt=""></div>
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-type" id="modal-type"></div>
      <div class="modal-stats" id="modal-stats"></div>
      <div class="modal-text" id="modal-text"></div>
    </div>
  </div>
</div>

<script>
const IMAGE_BASE = 'https://pub-5999238092ad418ca60e7a9ad641cf57.r2.dev/';

function toggleMobileNav() {
  document.getElementById('mobile-nav').classList.toggle('open');
}
function toggleMoreMenu(e){
  if(e) e.stopPropagation();
  var d=document.getElementById('more-dropdown');
  if(!d) return;
  var open=d.classList.toggle('open');
  if(open){ setTimeout(function(){ document.addEventListener('click', moreMenuOutside); },0); }
  else { document.removeEventListener('click', moreMenuOutside); }
}
function moreMenuOutside(e){
  var d=document.getElementById('more-dropdown');
  if(d && !d.classList.contains('open')) return;
  if(d && !e.target.closest('.more-menu')){ d.classList.remove('open'); document.removeEventListener('click', moreMenuOutside); }
}

// Auth bar (same pattern as the rest of the site)
(async function initAuth() {
  if (!window.CR) return;
  CR.onAuthChange = () => { CR.renderAuthBar('auth-bar'); };
  await CR.refreshUser();
  CR.renderAuthBar('auth-bar');
  if (CR.supa) {
    CR.supa.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') CR.refreshUser().then(() => { CR.renderAuthBar('auth-bar'); });
    });
  }
})();

// ---- Tokens page ----
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function subTypeStr(c){ const s = c && c.subTypes; return Array.isArray(s) ? s.join(' · ') : (s || ''); }
function imgFor(slug){ return IMAGE_BASE + slug + '.png'; }

let TOKEN_INDEX = {};   // unique id -> { card record + slug } for the modal
let TID = 0;

async function loadTokens() {
  let cards, tokens;
  try {
    [cards, tokens] = await Promise.all([
      fetch('cards.json').then(r => { if(!r.ok) throw new Error('cards.json '+r.status); return r.json(); }),
      fetch('tokens.json').then(r => { if(!r.ok) throw new Error('tokens.json '+r.status); return r.json(); })
    ]);
  } catch (e) {
    document.getElementById('load-status').textContent = 'Could not load token data. ' + e.message;
    return;
  }

  const list = Array.isArray(cards) ? cards : (cards.cards || []);
  const byName = {};
  list.forEach(c => { byName[c.name.toLowerCase()] = c; });

  const main = document.getElementById('token-main');
  let html = '';

  (tokens.groups || []).forEach(group => {
    html += `<section class="token-section">
      <h2>${esc(group.title)}</h2>`;
    if (group.blurb) html += `<p class="blurb">${esc(group.blurb)}</p>`;
    html += `<div class="card-grid">`;

    (group.cards || []).forEach(entry => {
      const rec = byName[(entry.name || '').toLowerCase()];
      if (!rec) { console.warn('[tokens] not found in cards.json:', entry.name); return; }
      const id = 't' + (TID++);
      const isSite = (rec.guardian && rec.guardian.type) === 'Site';
      TOKEN_INDEX[id] = { rec, slug: entry.slug, name: entry.name, isSite };
      const meta = [rec.guardian && rec.guardian.type, subTypeStr(rec)].filter(Boolean).join(' · ');
      const imgTag = `<img src="${imgFor(entry.slug)}" alt="${esc(entry.name)}" loading="lazy" onerror="this.closest('.card-thumb').style.display='none'">`;
      html += `<div class="card-thumb${isSite ? ' site' : ''}" onclick="openModal('${id}')">
          ${isSite ? `<div class="thumb-frame">${imgTag}</div>` : imgTag}
          <div class="card-thumb-name">${esc(entry.name)}</div>
          <div class="card-thumb-meta">${esc(meta)}</div>
        </div>`;
    });

    html += `</div></section>`;
  });

  // Status markers
  if (tokens.markers && tokens.markers.length) {
    html += `<section class="token-section">
      <h2>Status Markers</h2>
      <p class="status-note">Board states you track with counters or tokens — not cards. See the Codex for exact rules.</p>
      <ul class="markers">`;
    tokens.markers.forEach(m => {
      html += `<li><span class="mk-name">${esc(m.name)}</span><span class="mk-desc">${esc(m.desc)}</span></li>`;
    });
    html += `</ul></section>`;
  }

  main.innerHTML = html;
}

function openModal(id) {
  const t = TOKEN_INDEX[id];
  if (!t) return;
  const g = t.rec.guardian || {};
  document.getElementById('modal-card').classList.toggle('site-modal', !!t.isSite);
  const img = document.getElementById('modal-img');
  img.src = imgFor(t.slug);
  img.alt = t.name;
  img.onerror = function(){ this.style.opacity = '0'; };
  img.style.opacity = '1';
  document.getElementById('modal-name').textContent = t.name;
  document.getElementById('modal-type').textContent = [g.type, subTypeStr(t.rec)].filter(Boolean).join(' · ');

  const stats = [];
  if (g.cost != null) stats.push(`<span class="modal-stat"><b>Cost</b> ${g.cost}</span>`);
  if (g.attack != null) stats.push(`<span class="modal-stat"><b>Power</b> ${g.attack}</span>`);
  if (g.defence != null) stats.push(`<span class="modal-stat"><b>Defence</b> ${g.defence}</span>`);
  if (g.life != null) stats.push(`<span class="modal-stat"><b>Life</b> ${g.life}</span>`);
  if (g.rarity) stats.push(`<span class="modal-stat"><b>Rarity</b> ${esc(g.rarity)}</span>`);
  document.getElementById('modal-stats').innerHTML = stats.join('');

  const rules = (g.rulesText || '').replace(/\r\n/g, '\n').trim();
  document.getElementById('modal-text').textContent = rules;
  document.getElementById('modal-text').style.display = rules ? '' : 'none';

  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget && !(e.target.classList && e.target.classList.contains('modal-close'))) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadTokens();
</script>
</body>
</html>
